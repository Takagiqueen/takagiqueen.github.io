# 示例 Nginx 配置：用于 Ubuntu 服务器托管 Astro 静态网站
# 使用前请把 server_name 和 root 改成你的真实域名与部署目录。

server {
    listen 80;
    server_name leafvault.cn www.leafvault.cn;

    root /var/www/personal-site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
